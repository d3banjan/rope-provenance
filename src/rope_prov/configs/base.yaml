# Shared training base. vanilla.yaml and rope_prov.yaml each override only
# the architecture-specific fields below the divider; everything else MUST
# stay identical across the paired runs so the comparison is clean.
model: HuggingFaceTB/SmolLM2-135M
role_map: src/rope_prov/configs/role_map.yaml

# --- Data ---
dataset: yahma/alpaca-cleaned
dataset_split: train
seq_len: 1024
train_size: null            # null = all examples with non-empty input field
eval_size: 200              # held-out for eval; same indices across variants

# Synthetic matched-pair counterfactuals. Keep defaults at zero so old results
# remain exactly reproducible; enable via *_counterfactual.yaml configs.
counterfactual_train_size: 0
counterfactual_eval_size: 0
counterfactual_seed: 0
counterfactual_positive_fraction: 0.5

# --- Optimizer ---
batch_size: 4
grad_accum: 8               # effective batch 32 (same math as 8x4, half per-step memory)
eval_batch_size: 2          # eval allocates extra activations; halve again
lr: 2.0e-5
weight_decay: 0.0
warmup_ratio: 0.03
max_grad_norm: 1.0
epochs: 3

# --- Precision / hardware ---
bf16: true
prediction_loss_only: true    # skip accumulating eval logits tensor (huge);
                              # we only care about eval loss for now
gradient_checkpointing: false # kept off — try-cheap-first; flip to true only
                              # if prediction_loss_only + eval_batch_size=2 +
                              # pre-eval cache flush still OOM.

# --- Logging / eval cadence ---
logging_steps: 10
eval_steps: 200
save_steps: 1000

# --- Reproducibility ---
seed: 0                     # SAME seed across paired variants

# --- W&B ---
wandb_project: rope-provenance
wandb_entity: d3banjan
wandb_group: smollm2-135m-alpaca-v1   # SAME group; variants distinguished by run_name
